                Chiy42m9J0zfrtzc5va6G1D/ETmVUG1coD6K3QfvhKlyeLy0OOKUajkDbqdb495D
                RNc/kxxwbayFm+A91jwVoZKhfzvswx+5ie6UO63mn/3mR3BrPJnHeRaZhWQskjk=
                -----END CERTIFICATE-----
                EOF

      - name: Test LXC Connection
        run: |
          lxc list
          lxc remote list

      - name: Deploy VM
        if: github.event.inputs.action == 'deploy'
        run: |
          lxc profile show ${{ env.LXC_PROFILE }} || lxc profile create ${{ env.LXC_PROFILE }}
          lxc profile edit ${{ env.LXC_PROFILE }} < lxc/k3s-dev-cluster-01-profile.yaml
          lxc launch ${{ env.LXC_IMAGE }} ${{ github.event.inputs.vm_name }} \
            --profile ${{ env.LXC_PROFILE }} \
            --project ${{ env.LXC_PROJECT }}

      - name: Test MACVLAN
        if: github.event.inputs.action == 'test-macvlan'
        run: |
          VM_NAME="test-macvlan-${{ github.run_id }}"
          echo "Testing macvlan with VM: $VM_NAME"
          lxc launch ${{ env.LXC_IMAGE }} $VM_NAME \
            --profile default \
            --profile runner-macvlan \
            --project ${{ env.LXC_PROJECT }}
          echo "Waiting for VM to provision..."
          sleep 30
          echo "=== VM Info ==="
          lxc list $VM_NAME --project ${{ env.LXC_PROJECT }}
          echo ""
          echo "=== Network Info ==="
          lxc exec $VM_NAME -- ip addr show
          echo ""
          echo "=== Cleanup ==="
          lxc delete $VM_NAME --force || true

      - name: Start VM
        if: github.event.inputs.action == 'start'
        run: |
          lxc start ${{ github.event.inputs.vm_name }}

      - name: Stop VM
        if: github.event.inputs.action == 'stop'
        run: |
          lxc stop ${{ github.event.inputs.vm_name }}

      - name: Delete VM
        if: github.event.inputs.action == 'delete'
        run: |
          lxc delete ${{ github.event.inputs.vm_name }} --force

      - name: Get VM Status
        if: github.event.inputs.action == 'status'
        run: |
          lxc list ${{ github.event.inputs.vm_name }} --project ${{ env.LXC_PROJECT }}

      - name: Wait for VM
        if: github.event.inputs.action == 'deploy'
        run: sleep 30

      - name: Install K3s
        if: github.event.inputs.action == 'deploy'
        run: |
          lxc exec ${{ github.event.inputs.vm_name }} -- bash -c '
            curl -sfL https://get.k3s.io | sh -
          '

      - name: Install Tailscale
        if: github.event.inputs.action == 'deploy'
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          lxc exec ${{ github.event.inputs.vm_name }} -- bash -c '
            curl -fsSL https://tailscale.com/install.sh | sh
            tailscale up --authkey=$TS_AUTHKEY --accept-routes
          '

      - name: Get VM Info
        if: github.event.inputs.action == 'status' || github.event.inputs.action == 'deploy'
        run: |
          echo "=== VM Info ==="
          lxc list ${{ github.event.inputs.vm_name }} --project ${{ env.LXC_PROJECT }}
          echo ""
          echo "=== Network Info ==="
          lxc exec ${{ github.event.inputs.vm_name }} -- ip addr show
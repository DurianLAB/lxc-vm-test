name: Deploy K3s LXC VM

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: 'VM Name'
        required: true
        default: 'k3s-dev-cluster-01'
      action:
        description: 'Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - test-macvlan
          - delete
          - start
          - stop
          - status

env:
  LXC_SERVER: ${{ vars.LXC_SERVER || '192.168.1.206' }}
  LXC_PORT: ${{ vars.LXC_PORT || '8443' }}
  LXC_PROJECT: ${{ vars.LXC_PROJECT || 'default' }}
  LXC_PROFILE: ${{ vars.LXC_PROFILE || 'k3s-dev-cluster-01-profile' }}
  LXC_IMAGE: ${{ vars.LXC_IMAGE || 'ubuntu/22.04' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LXC
        run: |
          sudo apt-get update
          sudo apt-get install -y lxc

      - name: Setup LXC Certificates
        run: |
          mkdir -p ~/.config/lxc
          echo "${{ secrets.LXC_CLIENT_CRT }}" > ~/.config/lxc/client.crt
          echo "${{ secrets.LXC_CLIENT_KEY }}" > ~/.config/lxc/client.key
          chmod 600 ~/.config/lxc/client.key

      - name: Configure LXC Remote
        run: |
          cat > ~/.config/lxc/config.yml << 'EOF'
          default-remote: runner
          remotes:
            runner:
              addr: https://${{ env.LXC_SERVER }}:${{ env.LXC_PORT }}
              protocol: lxd
              auth_type: tls
              certificate: |
